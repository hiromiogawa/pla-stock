# Project-specific configuration values
# Referenced by skills (code-quality, conventional-commits, etc.) for project-specific settings.

project:
  name: pla-stock
  type: single-package

coverage:
  minimum: 60
  target: 75

architecture:
  # Phase 2 でスキャフォールド時に確定。FSD 類似構造を採用予定。
  type: tbd

scopes:
  # Domain features (MVP)
  - kit              # プラモデル（キット）管理
  - paint            # 塗料管理
  - project          # 製作プロジェクト
  - stock            # 在庫モデル（共通）
  # FSD layer (アーキテクチャ層への変更)
  - shared
  - entities
  - features
  - widgets
  - views
  - routes
  # Cross-cutting
  - auth             # Clerk 認証
  - nav              # ナビゲーション
  - ui               # shared/ui コンポーネント
  - infra            # Cloudflare Workers / Neon / Drizzle / env
  - deps             # dependency add/upgrade
  - ci               # GitHub Actions
  - docs             # documentation
  - tooling          # lint/format/commit hook 等の開発ツール
