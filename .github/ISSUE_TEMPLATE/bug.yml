name: Bug
description: 不具合（基本1PR）
labels: ["bug"]
body:
  - type: textarea
    id: what_happened
    attributes:
      label: 何が起きたか
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期待動作
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: 環境
      placeholder: |
        - OS:
        - Browser:
        - Version:
