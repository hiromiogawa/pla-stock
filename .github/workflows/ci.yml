# pnpm check 相当のチェック + test + production build を matrix で並列・独立実行する
# CI ワークフロー。各 check が個別の job として表示され、1 つ落ちても他は最後まで走る
# (fail-fast: false)。Node / pnpm のバージョンは .nvmrc / package.json の packageManager
# から取得しローカルと CI の差を SSoT に寄せる。
# 詳細: #151 (基盤) / #110 (test 追加) / #160 (build 追加 = typecheck だけでは捕まらない
# vite bundling / Cloudflare Workers 変換時の runtime issue を CI でも検出)。
name: CI

on:
  pull_request:
  push:
    branches: [main]

# 同じ ref で新しい push が来たら古い実行をキャンセル (PR の連続 push で無駄を出さない)。
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    # PR 上に "CI / pnpm lint" "CI / pnpm typecheck" 等の個別 status として並ぶ。
    name: pnpm ${{ matrix.check.name }}
    runs-on: ubuntu-latest
    strategy:
      # 1 つの check が落ちても他の check を中断しない。
      # 「lint で落ちたから typecheck の結果がわからない」を避け、全失敗を一覧で把握する。
      fail-fast: false
      matrix:
        check:
          - { name: lint, cmd: pnpm lint }
          - { name: lint:deprecated, cmd: pnpm lint:deprecated }
          - { name: format, cmd: pnpm format }
          - { name: typecheck, cmd: pnpm typecheck }
          - { name: depcruise, cmd: pnpm depcruise }
          - { name: knip, cmd: pnpm knip }
          - { name: workflow-pins, cmd: pnpm check:workflow-pins }
          - { name: test-coverage, cmd: pnpm check:test-coverage }
          - { name: test, cmd: pnpm test }
          - { name: build, cmd: pnpm build }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # サードパーティ製 action は supply chain 攻撃対策で commit SHA pin
        # (v タグは author が差し替え可能)。バージョン上げ時は新 SHA を再取得して差し替える。
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ${{ matrix.check.name }}
        run: ${{ matrix.check.cmd }}

  coverage-report:
    # ADR-0017 (2026-05-24 / #206): **C1 (branches) のみ全体 >= 70% を gate**。
    # vitest.config.ts の `coverage.thresholds.branches: 70` を `pnpm test:coverage` が
    # 評価し、違反時 exit 1 で本 job が fail する (= PR merge ブロック)。
    # C0 / Lines / Functions は閾値なし、引き続き PR comment への参考値表示のみ。
    # ADR-0016 (2026-05-23 update / #198) の「閾値 gate 不採用」方針は C1 例外で部分 update。
    name: coverage report (C1 gate + 他 metric 参考値)
    runs-on: ubuntu-latest
    # PR でのみ走る (main への push では comment 先がないため skip)
    if: github.event_name == 'pull_request'
    permissions:
      # davelosert/vitest-coverage-report-action が PR にコメント投稿するため
      pull-requests: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run coverage
        # vitest.config の coverage 設定 (v8 / json-summary / json reporter) で
        # ./coverage/coverage-summary.json と ./coverage/coverage-final.json を生成。
        run: pnpm test:coverage

      - name: Report coverage to PR
        # 3rd-party action は commit SHA pin 必須 (check:workflow-pins で機械強制)。
        uses: davelosert/vitest-coverage-report-action@02f3c2e641286b7fa308cd3e430783103ce6103b # v2.12.0
